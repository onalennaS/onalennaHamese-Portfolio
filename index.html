<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Home - Seja Onalenna Hamese</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <button class="mobile-menu" id="mobile-menu-toggle">
                <i class="fas fa-bars" id="menu-icon"></i>
                <i class="fas fa-times" id="close-icon" style="display:none"></i>
            </button>
            <ul class="nav-links" id="nav-links">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="skills.html">Skills</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <section class="hero">
            <div class="hero-content">
                <div class="hero-text">
                    <h1>Hi, Im <span class="highlight">Seja Onalenna Hamese</span></h1>
                    <p>Dedicated IT student in my final semester at Vaal University of Technology, passionate about full-stack development and creating innovative digital solutions.</p>
                    <a class="cta-button" href="contact.html">Get in touch</a>
                </div>
                <div class="hero-visual">
                    <div class="code-halo">
                        <div class="profile-image-container halo-center">
                            <img src="js/images/image.jpg" alt="Seja Onalenna Hamese" class="profile-image">
                        </div>
                        <div class="halo-element" style="--i:1">
                            <div class="code-bubble">HTML5</div>
                            <i class="fab fa-html5"></i>
                        </div>
                        <div class="halo-element" style="--i:2">
                            <div class="code-bubble">CSS3</div>
                            <i class="fab fa-css3-alt"></i>
                        </div>
                        <div class="halo-element" style="--i:3">
                            <div class="code-bubble">JS</div>
                            <i class="fab fa-js"></i>
                        </div>
                        <div class="halo-element" style="--i:4">
                            <div class="code-bubble">Java</div>
                            <i class="fab fa-java"></i>
                        </div>
                        <div class="halo-element" style="--i:5">
                            <div class="code-bubble">Python</div>
                            <i class="fab fa-python"></i>
                        </div>
                        <div class="halo-element" style="--i:6">
                            <div class="code-bubble">MySQL</div>
                            <i class="fas fa-database"></i>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        (function(){
            const toggleButton = document.getElementById("mobile-menu-toggle");
            const navLinks = document.getElementById("nav-links"); 
            const menuIcon = document.getElementById("menu-icon");
            const closeIcon = document.getElementById("close-icon");
            
            if (!toggleButton) return;
            
            toggleButton.addEventListener("click", () => {
                const isOpen = navLinks.classList.toggle("show");
                if (isOpen) {
                    menuIcon.style.display = "none";
                    closeIcon.style.display = "inline-block";
                } else {
                    menuIcon.style.display = "inline-block";
                    closeIcon.style.display = "none";
                }
            });

            document.querySelectorAll(".nav-links a").forEach(a => 
                a.addEventListener("click", () => {
                    navLinks.classList.remove("show");
                    menuIcon.style.display = "inline-block";
                    closeIcon.style.display = "none";
                })
            );
        })();
    </script>
</body>
</html>
